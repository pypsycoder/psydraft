<section class="section" id="diagnosis-section">
  <div class="section-heading">
    <span>05</span>
    <h2>Диагноз</h2>
  </div>
  <div class="section-card">
    <div class="metric-grid">
      <label>Статус клинической оценки
        <select id="diagnosis_status">
          <option value="">—</option>
          <option value="синдромный сигнал, требуется уточнение">Синдромный сигнал, требуется уточнение</option>
          <option value="рабочий диагноз">Рабочий диагноз</option>
          <option value="подтверждённый диагноз">Подтверждённый диагноз</option>
          <option value="дифференциальный диагноз">Дифференциальный диагноз</option>
        </select>
      </label>
      <label>Основание клинической оценки
        <textarea id="diagnosis_basis" rows="2" placeholder="клинические критерии, ПСГ/КРМ/HSAT, лабораторные данные; дата исследования"></textarea>
      </label>
    </div>
    <label class="diagnosis-search">
      Поиск по сомнологическим диагнозам
      <input id="diagnosis_search" type="text" autocomplete="off" placeholder="например: инсомния, апноэ, циркадное, нарколепсия">
      <div id="diagnosis_results" class="diagnosis-results"></div>
    </label>
    <div class="diagnosis-selected-panel">
      <span class="field-label">Выбранные диагнозы</span>
      <div id="diagnosis_list" class="diagnosis-list" aria-live="polite"></div>
      <textarea id="diagnosis" class="hidden-field" aria-hidden="true" tabindex="-1"></textarea>
    </div>
    <div class="diagnosis-manual">
      <label>
        Добавить вручную
        <textarea id="diagnosis_manual" rows="2" placeholder="например: G47.0 Инсомния, уточнение"></textarea>
      </label>
      <button type="button" class="secondary" id="add_manual_diagnosis">Добавить</button>
    </div>
  </div>
</section>
