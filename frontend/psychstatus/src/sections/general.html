<div class="section" id="section-general">
    <h2>📋 Общие разделы</h2>

    <div class="section-card">

        <label>Жалобы:</label>
        <textarea id="complaints" placeholder="активно не предъявляет"></textarea>

        <label>Анамнез заболевания:</label>
        <textarea id="anamnesis"></textarea>

        <label>Состояние на учете в ПНД и наркологическом диспансере:</label>
        <select id="dispensary_status">
            <option value="">— выбрать —</option>
            <option>состоит</option>
            <option>не состоит</option>
            <option>наблюдается у частных специалистов</option>
        </select>

        <label>Лечение у психиатра, нарколога, психотерапевта:</label>
        <textarea id="dispensary_treatment"></textarea>

        <label>Считает себя больным в течение:</label>
        <div style="display:flex;gap:8px;align-items:center;">
            <input type="number" id="ill_days" min="0" placeholder="например, 30" style="width:140px;">
            <select id="ill_days_unit">
                <option value="дней">дней</option>
                <option value="месяцев">месяцев</option>
                <option value="лет">лет</option>
            </select>
        </div>

        <label>Самостоятельное лечение:</label>
        <textarea id="self_treatment"></textarea>

        <label>Динамика заболевания:</label>
        <textarea id="dynamics"></textarea>

        <!-- INCLUDE life_history_block.html -->

    </div>
</div>
